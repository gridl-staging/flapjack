worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Upstream group: round-robin with active health checks.
    # nginx removes nodes that fail /health checks.
    upstream flapjack_nodes {
        server node-a:7700;
        server node-b:7700;
        server node-c:7700;

        # Keep alive connections for performance
        keepalive 32;
    }

    # Status page (for monitoring)
    server {
        listen 8080;
        location /nginx_status {
            stub_status;
            allow all;
        }
    }

    # Main load balancer
    server {
        listen 80;

        # Health check endpoint — nginx proxies this to any live node
        location /health {
            proxy_pass http://flapjack_nodes;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Fast health check timeouts
            proxy_connect_timeout 2s;
            proxy_read_timeout 3s;
        }

        # All API traffic
        location / {
            proxy_pass http://flapjack_nodes;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Reasonable timeouts for search operations
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Retry on upstream errors (node down)
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }
    }
}
