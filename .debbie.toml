[project]
name = "flapjack"

# -- Repos (absolute paths) ---------------------------------------------------

[repos.dev]
path = "/Users/stuart/repos/gridl-dev/flapjack_dev"

[repos.staging]
path = "/Users/stuart/repos/gridl-staging/flapjack"
github = "gridl-staging/flapjack"

[repos.prod]
path = "/Users/stuart/repos/gridl-hq/flapjack"
github = "gridl-hq/flapjack"

# -- Identity -----------------------------------------------------------------
# All non-target values are replaced with the target value during sync.
# Sorted longest-first to avoid substring collisions.

[identity.dev]
github = "gridl-dev"
github_legacy = "stuartcrobinson/flapjack202511"
install_url = "install.flapjack.foo"
ghcr = "gridl-dev"

[identity.staging]
github = "gridl-staging"
github_legacy = "gridlhq-staging/flapjack"
install_url = "staging.flapjack.foo"
ghcr = "gridl-staging"

[identity.prod]
github = "gridl-hq"
github_legacy = "gridlhq/flapjack"
install_url = "install.flapjack.foo"
ghcr = "gridl-hq"

# -- Sync (strict whitelist) --------------------------------------------------
# Public mirror policy: sync only required code/build/test assets and
# public-facing README files. Do not sync the repo root with an exclude list.

[sync]
files = [
    ".gitignore",
    "LICENSE",
    "README.md",
    "engine/README.md",
    # Canonical planning doc linked from README.md and engine/README.md.
    "ROADMAP.md",
    # Current priorities doc linked from ROADMAP.md.
    "PRIORITIES.md",
    # Engine architecture/indexing reference linked from engine/README.md.
    "engine/LIB.md",
    # Feature ledger linked from engine/README.md and ROADMAP.md.
    # Rewrite is enabled below to scrub a historical "gridl-dev" changelog token.
    "engine/docs2/FEATURES.md",
    # Committed OpenAPI export validated in staging/prod.
    "engine/docs2/openapi.json",
    # Public load-test benchmark doc linked from PRIORITIES.md.
    "engine/loadtest/BENCHMARKS.md",
    "engine/Cargo.toml",
    "engine/Cargo.lock",
    "engine/.gitignore",
    "engine/Dockerfile",
    "engine/Dockerfile.dockerignore",
    "engine/.dockerignore",
    "engine/entrypoint.sh",
    "engine/install.sh",
    "engine/.config/nextest.toml",
]

[[sync.dirs]]
path = "engine/src/"
exclude = ["DELETEME_*", "*.bak"]

[[sync.dirs]]
path = "engine/benches/"

[[sync.dirs]]
path = "engine/flapjack-http/"
# .fastembed_cache holds local ML model binaries and must never sync to public repos.
exclude = ["target", ".fastembed_cache"]

[[sync.dirs]]
path = "engine/flapjack-server/"
exclude = ["target"]

[[sync.dirs]]
path = "engine/flapjack-ssl/"
exclude = ["target"]

[[sync.dirs]]
path = "engine/flapjack-replication/"
exclude = ["target"]

[[sync.dirs]]
path = "engine/tests/"
# test_ha_soak_harness.rs references engine/_dev/ paths that are not synced to public repos.
exclude = ["*.bak", "manual/", "test_ha_soak_harness*", "validate_sync_surface.sh"]

[[sync.dirs]]
path = "engine/fixtures/"

[[sync.dirs]]
path = "engine/package/"

[[sync.dirs]]
path = "engine/examples/"

[[sync.dirs]]
# Public strategy docs consumed by the canonical documentation graph.
path = "engine/docs2/1_STRATEGY/"

[[sync.dirs]]
# Public implementation/operator docs consumed by README links; exclude internal ADRs.
path = "engine/docs2/3_IMPLEMENTATION/"
exclude = ["decisions/"]

[[sync.dirs]]
path = "engine/dashboard/"
exclude = [
    "node_modules",
    "dist",
    "BUILD_SESSION_*",
    "SESSION_*",
    "TESTING_SUMMARY*",
    "playwright-report",
    "test-results",
    # Internal dashboard artifacts/config are intentionally private.
    "_dev",
    # Anchor to root so nested src/data/ (sample JSON imported by dashboard) is not excluded.
    "/data/",
    "tour/",
    "CLAUDE.md",
    "bin/flapjack-stable",
    "bin/flapjack-stable.bak",
    "*.bak",
    ".DS_Store",
]

[[sync.dirs]]
path = "engine/sdk_test/"
exclude = [
    "node_modules",
    ".cache",
    "data",
    "archive_old",
    "_archive/",
    "audit_algolia_defaults.js",
    "MIGRATION_TEST_GUIDE.md",
]

[[sync.dirs]]
path = "sdks/"
# Preserve SDK lockfiles so public CI jobs can use deterministic dependency
# resolution for Python and JavaScript SDK lanes.
exclude = ["node_modules", ".gradle", "build", "__pycache__", ".dart_tool", "AGENTS.md"]

[[sync.dirs]]
path = ".github/"

[[sync.dirs]]
path = "integrations/laravel-scout/"

# integrations/ remains excluded by omission until explicitly approved for public sync.

[[sync.remap]]
# Remap vetted _dev scripts into public engine/s/ paths as the single sync source.
from = "engine/_dev/s/ci.sh"
to = "engine/s/ci.sh"

[[sync.remap]]
# Remap vetted _dev scripts into public engine/s/ paths as the single sync source.
from = "engine/_dev/s/release.sh"
to = "engine/s/release.sh"

[[sync.remap]]
# Remap vetted _dev scripts into public engine/s/ paths as the single sync source.
from = "engine/_dev/s/lib/version.sh"
to = "engine/s/lib/version.sh"

[[sync.remap]]
# Remap vetted _dev scripts into public engine/s/ paths as the single sync source.
from = "engine/_dev/s/dev-server.sh"
to = "engine/s/dev-server.sh"

# -- Rewrite ------------------------------------------------------------------
# Only files that need identity rewrites. ci.yml and nightly.yml are NOT
# rewritten because their check-repo guards use literal repo names (staging
# and prod only — the private dev repo is intentionally excluded).

[rewrite]
files = [
    "README.md",
    "engine/README.md",
    # Rewrite identity tokens in changelog history before syncing FEATURES.md.
    "engine/docs2/FEATURES.md",
    "engine/install.sh",
    ".github/workflows/docker.yml",
    ".github/workflows/release.yml",
]

# -- Transforms ---------------------------------------------------------------

[[transforms]]
target = "staging"
files = ["README.md"]
replace = { old = "## Install", new = "## Install (Staging)" }

[[transforms]]
target = "prod"
files = ["README.md"]
replace = { old = "## Install (Staging)", new = "## Install" }

# -- Hooks --------------------------------------------------------------------

[hooks]
staging = ".debbie/post-sync.sh"
prod = ".debbie/post-sync.sh"
