name: Nightly Tests

# Comprehensive nightly test suite — runs on public repos only (staging/prod).
# The private dev repo is excluded because GitHub
# Actions minutes cost money on private repos. Use `debbie sync staging` to
# push changes where nightly CI runs for free.
#
# Covers: all Rust tests, dashboard integration with Algolia, all SDK versions,
# all integration tests.

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering
    inputs:
      run_migration_scale_contract:
        description: 'Run opt-in migration scale contract'
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Guard: only run on recognized public repos. The private dev repo is
  # intentionally excluded — CI belongs on staging/prod where Actions is free.
  check-repo:
    runs-on: ubuntu-latest
    outputs:
      is-public-repo: ${{ steps.check.outputs.is-public-repo }}
    steps:
      - id: check
        run: |
          if [ "${{ github.repository }}" = "flapjackhq/flapjack" ] || [ "${{ github.repository }}" = "gridl-staging/flapjack" ]; then
            echo "is-public-repo=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-public-repo=false" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # RUST ENGINE TESTS (ALL)
  # ============================================================================

  rust-all-tests:
    name: Rust all tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h
        working-directory: .
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine
      - uses: taiki-e/install-action@a93b01ec36baa756f8701f3a0a8daa54a46d6339 # nextest
      - name: Install cargo audit/deny tools for security audit tests
        uses: taiki-e/install-action@a93b01ec36baa756f8701f3a0a8daa54a46d6339 # cargo-audit,cargo-deny
        with:
          tool: cargo-audit,cargo-deny
          fallback: none
      - name: Create dashboard dist stub (for RustEmbed)
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Rustfmt
        run: cargo fmt --all --check
      - name: Clippy
        run: >
          cargo clippy --workspace --all-targets -- -D warnings
          -A clippy::too_many_arguments
          -A clippy::type_complexity
          -A clippy::only_used_in_recursion
          -A deprecated
      - name: Build binaries
        run: cargo build --package flapjack-server
      - name: Run all tests
        timeout-minutes: 45
        run: cargo nextest run -P ci

  installer-all:
    name: Installer tests (all platforms)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run installer tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sh engine/tests/test_install.sh

  # ============================================================================
  # DASHBOARD TESTS (ALL)
  # ============================================================================

  dashboard-all:
    name: Dashboard all tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine
      - name: Create dashboard dist stub (for RustEmbed)
        working-directory: engine
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build Flapjack server binary
        working-directory: engine
        run: cargo build --package flapjack-server --features vector-search
      - name: Start Flapjack server
        run: |
          chmod +x engine/target/debug/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY=fj_devtestadminkey000000 engine/target/debug/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
          curl --retry 60 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://localhost:7700/health/ready
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: engine/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: engine/dashboard
        run: npm ci
      - name: Install Playwright browsers
        working-directory: engine/dashboard
        run: npx playwright install --with-deps chromium
      - name: Type check & build
        working-directory: engine/dashboard
        run: npm run build
      - name: Run unit tests
        working-directory: engine/dashboard
        run: npm run test:unit:run
      - name: Run page tests
        working-directory: engine/dashboard
        run: npm run test:pages
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
      - name: Run integration tests
        working-directory: engine/dashboard
        run: npm run test:integration
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: dashboard-all-tests-report
          path: engine/dashboard/playwright-report/
          retention-days: 14

  # ============================================================================
  # BUILD SERVER (shared by SDK e2e tests)
  # ============================================================================

  build-server:
    name: Build server binary
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine
      - name: Create dashboard dist stub (for RustEmbed)
        working-directory: engine
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build server
        working-directory: engine
        run: cargo build --package flapjack-server --features vector-search
      - name: Upload server binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flapjack-server
          path: engine/target/debug/flapjack
          retention-days: 1

  migration-import-contract:
    name: Migration import contract
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine
      - name: Create dashboard dist stub (for RustEmbed)
        working-directory: engine
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build release server
        working-directory: engine
        run: cargo build --release --locked --package flapjack-server --features vector-search
      - name: Run scheduled migration import oracle
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
        run: |
          set -euo pipefail

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              printf 'ERROR: required secret is not configured: %s\n' "$name" >&2
              return 1
            fi
          }

          algolia_request() {
            local method="$1"
            local path="$2"
            local body="${3:-}"
            local out="$4"
            local body_file=""
            if [ -n "$body" ]; then
              body_file="$(mktemp "$RUNNER_TEMP/algolia-body.XXXXXX")"
              chmod 600 "$body_file"
              printf '%s' "$body" >"$body_file"
            fi
            {
              printf 'silent\n'
              printf 'show-error\n'
              printf 'fail\n'
              printf 'request = "%s"\n' "$method"
              printf 'url = "https://%s.algolia.net%s"\n' "$ALGOLIA_APP_ID" "$path"
              printf 'header = "x-algolia-application-id: %s"\n' "$ALGOLIA_APP_ID"
              printf 'header = "x-algolia-api-key: %s"\n' "$ALGOLIA_ADMIN_KEY"
              printf 'header = "content-type: application/json"\n'
              if [ -n "$body_file" ]; then
                printf 'data-binary = "@%s"\n' "$body_file"
              fi
            } | curl --config - >"$out"
            [ -z "$body_file" ] || rm -f "$body_file"
          }

          wait_algolia_task() {
            local index="$1"
            local task_id="$2"
            local out="$RUNNER_TEMP/algolia-task-${task_id}.json"
            local status=""
            for _ in $(seq 1 60); do
              algolia_request GET "/1/indexes/${index}/task/${task_id}" "" "$out"
              status="$(jq -r '.status // empty' "$out")"
              [ "$status" = "published" ] && return 0
              sleep 1
            done
            printf 'ERROR: Algolia task %s for %s did not publish; last status=%s\n' "$task_id" "$index" "$status" >&2
            return 1
          }

          cleanup_source_index() {
            local rc=$?
            if [ -n "${SOURCE_INDEX:-}" ]; then
              local cleanup_out="$RUNNER_TEMP/algolia-cleanup.json"
              algolia_request DELETE "/1/indexes/${SOURCE_INDEX}" "" "$cleanup_out"
              local cleanup_task_id
              cleanup_task_id="$(jq -er '.taskID' "$cleanup_out")"
              wait_algolia_task "$SOURCE_INDEX" "$cleanup_task_id"
            fi
            return "$rc"
          }

          require_secret ALGOLIA_APP_ID "$ALGOLIA_APP_ID"
          require_secret ALGOLIA_ADMIN_KEY "$ALGOLIA_ADMIN_KEY"
          SECRET_FILE="$RUNNER_TEMP/migration_import_contract.env"
          ORACLE_LOG="$RUNNER_TEMP/migration-import-contract.log"
          : >"$ORACLE_LOG"
          SEEDED_OBJECT_COUNT=2
          INDEX_PREFIX="fj_migration_import_${{ github.run_id }}_${{ github.run_attempt }}"
          SOURCE_INDEX="${INDEX_PREFIX}_source"
          TARGET_INDEX="${INDEX_PREFIX}_target"
          trap cleanup_source_index EXIT

          {
            printf 'ALGOLIA_APP_ID=%s\n' "$ALGOLIA_APP_ID"
            printf 'ALGOLIA_ADMIN_KEY=%s\n' "$ALGOLIA_ADMIN_KEY"
          } >"$SECRET_FILE"
          chmod 600 "$SECRET_FILE"

          seed_payload="$(jq -nc '{
            requests: [
              {action: "addObject", body: {objectID: "scheduled-001", title: "Nightly migration import fixture one", category: "contract"}},
              {action: "addObject", body: {objectID: "scheduled-002", title: "Nightly migration import fixture two", category: "contract"}}
            ]
          }')"
          seed_out="$RUNNER_TEMP/algolia-seed.json"
          algolia_request POST "/1/indexes/${SOURCE_INDEX}/batch" "$seed_payload" "$seed_out"
          seed_task_id="$(jq -er '.taskID' "$seed_out")"
          wait_algolia_task "$SOURCE_INDEX" "$seed_task_id"

          count_out="$RUNNER_TEMP/algolia-source-count.json"
          algolia_request POST "/1/indexes/${SOURCE_INDEX}/query" '{"query":"","hitsPerPage":0}' "$count_out"
          source_count="$(jq -er '.nbHits' "$count_out")"
          if [ "$source_count" != "$SEEDED_OBJECT_COUNT" ]; then
            printf 'ERROR: expected %s seeded Algolia objects, found %s\n' "$SEEDED_OBJECT_COUNT" "$source_count" >&2
            exit 1
          fi

          FLAPJACK_BIN="$PWD/engine/target/release/flapjack" bash engine/tests/migration_import_contract.sh --expect-mode importing --secret-file "$SECRET_FILE" --source-index "$SOURCE_INDEX" --target-index "$TARGET_INDEX" 2>&1 | tee "$ORACLE_LOG"
          receipt="$(grep -E '^\{"mode":' "$ORACLE_LOG" | tail -1)"
          jq -e --arg expected "objects.imported=${SEEDED_OBJECT_COUNT}" \
            '.checks[] | select(.name == "migration_import" and .detail == $expected)' \
            <<<"$receipt" >/dev/null
      - name: Upload migration import oracle evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: migration-import-contract-evidence
          path: |
            ${{ runner.temp }}/migration-import-contract.log
            /tmp/flapjack_migration_import_contract_evidence_*
          retention-days: 14

  migration-scale-contract:
    name: Migration scale contract
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true' && github.event_name == 'workflow_dispatch' && inputs.run_migration_scale_contract == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      # dispatch-only isolation avoids repeated 20,000-document vendor work on the fast nightly path.
      - name: Run opt-in migration scale oracle
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
        run: |
          set -euo pipefail

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              printf 'ERROR: required secret is not configured: %s\n' "$name" >&2
              return 1
            fi
          }

          require_secret ALGOLIA_APP_ID "$ALGOLIA_APP_ID"
          require_secret ALGOLIA_ADMIN_KEY "$ALGOLIA_ADMIN_KEY"

          SECRET_FILE="$RUNNER_TEMP/migration_scale_contract.env"
          ORACLE_LOG="$RUNNER_TEMP/migration-scale-contract.log"
          MIGRATION_IMPORT_CONTRACT_EVIDENCE_ROOT="$RUNNER_TEMP/migration-scale-contract-evidence"
          export MIGRATION_IMPORT_CONTRACT_EVIDENCE_ROOT
          mkdir -p "$MIGRATION_IMPORT_CONTRACT_EVIDENCE_ROOT"
          {
            printf 'ALGOLIA_APP_ID=%s\n' "$ALGOLIA_APP_ID"
            printf 'ALGOLIA_ADMIN_KEY=%s\n' "$ALGOLIA_ADMIN_KEY"
          } >"$SECRET_FILE"
          chmod 600 "$SECRET_FILE"

          chmod +x /tmp/flapjack/flapjack
          oracle_status=0
          FLAPJACK_BIN="/tmp/flapjack/flapjack" timeout --kill-after=60s 5400s bash engine/tests/migration_import_contract.sh --expect-mode scale --two-point --secret-file "$SECRET_FILE" 2>&1 | tee "$ORACLE_LOG" || oracle_status=$?

          shopt -s globstar nullglob
          receipts=( "$MIGRATION_IMPORT_CONTRACT_EVIDENCE_ROOT"/**/receipt.json )
          [ "${#receipts[@]}" = "1" ] || {
            printf 'ERROR: expected exactly one scale receipt, found %s\n' "${#receipts[@]}" >&2
            exit 1
          }
          cp "${receipts[0]}" "$RUNNER_TEMP/migration-scale-contract-receipt.json"
          jq -e '
            .status == "pass"
            and .scale.mode == "two-point"
            and .scale.conditions == [2000,20000]
            and (.checks | length) > 0
            and all(.checks[]; .status != "fail")
          ' "$RUNNER_TEMP/migration-scale-contract-receipt.json" >/dev/null
          [ "$oracle_status" = "0" ]
      - name: Upload migration scale oracle evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: migration-scale-contract-evidence
          path: |
            ${{ runner.temp }}/migration-scale-contract.log
            ${{ runner.temp }}/migration-scale-contract-receipt.json
            ${{ runner.temp }}/migration-scale-contract-evidence
          retention-days: 14

  # ============================================================================
  # SDK TESTS (ALL VERSIONS)
  # ============================================================================

  sdk-php-all:
    name: PHP SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
          curl --retry 60 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://localhost:7700/health/ready
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
      - name: Install dependencies
        working-directory: sdks/php
        run: composer install --no-interaction --prefer-dist
      - name: Run tests
        working-directory: sdks/php
        run: vendor/bin/phpunit

  sdk-python-all:
    name: Python SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
          curl --retry 60 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://localhost:7700/health/ready
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        working-directory: sdks/python
        run: poetry install
      - name: Run tests
        working-directory: sdks/python
        run: poetry run pytest

  sdk-javascript-all:
    name: JavaScript SDK (all Node versions)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack (for yarn)
        run: corepack enable
      - name: Install dependencies
        working-directory: sdks/javascript
        run: yarn install
      - name: Build packages
        working-directory: sdks/javascript
        run: yarn build
      - name: Run tests
        working-directory: sdks/javascript/packages/flapjack-search
        run: yarn test

  sdk-go-all:
    name: Go SDK (all versions)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.21', '1.22', '1.23']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run tests
        working-directory: sdks/go
        run: go test ./flapjack/...

  sdk-go-e2e:
    name: Go SDK e2e tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
          curl --retry 60 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://localhost:7700/health/ready
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
      - name: Run e2e tests
        working-directory: sdks/go
        run: go test ./tests/...

  sdk-ruby-all:
    name: Ruby SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
          curl --retry 60 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://localhost:7700/health/ready
      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: sdks/ruby
      - name: Run tests
        working-directory: sdks/ruby
        run: bundle exec rake test

  sdk-java-all:
    name: Java SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
          curl --retry 60 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://localhost:7700/health/ready
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Run tests
        working-directory: sdks/java
        run: ./gradlew test

  sdk-csharp-all:
    name: C# SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['7.0.x', '8.0.x']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
          curl --retry 60 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://localhost:7700/health/ready
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore dependencies
        working-directory: sdks/csharp
        run: dotnet restore
      - name: Run tests
        working-directory: sdks/csharp
        run: dotnet test

  # ============================================================================
  # INTEGRATION TESTS (ALL VERSIONS)
  # ============================================================================

  # integration-laravel-all: removed 2026-05-28. The integration at
  # integrations/laravel-scout/ is currently a composer.json stub (no src/, no
  # tests/, no phpunit.xml). Pre-org-transfer the check-repo guard skipped this
  # job; post-transfer it ran and (correctly) failed because phpunit found no
  # suite. Reinstate this job when the Laravel Scout integration ships.

  integration-wordpress-all:
    name: WordPress (all versions)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout PHP SDK
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: temp-php-sdk
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
      - name: Copy PHP SDK
        run: |
          mkdir -p sdks/php
          cp -r temp-php-sdk/sdks/php/* sdks/php/ || true
      - name: Install dependencies
        working-directory: sdks/wordpress
        run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        working-directory: sdks/wordpress
        run: composer run test:unit
      - name: Run integration tests
        working-directory: sdks/wordpress
        run: composer run test:integration

  # ============================================================================
  # SUMMARY
  # ============================================================================

  nightly-summary:
    name: Nightly test summary
    needs:
      - check-repo
      - rust-all-tests
      - installer-all
      - dashboard-all
      - build-server
      - sdk-php-all
      - sdk-python-all
      - sdk-javascript-all
      - sdk-go-all
      - sdk-go-e2e
      - sdk-ruby-all
      - sdk-java-all
      - sdk-csharp-all
      - integration-wordpress-all
    if: always() && needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          {
            echo "## Nightly Test Results"
            echo ""
            echo "- Rust tests: ${{ needs.rust-all-tests.result }}"
            echo "- Installer tests: ${{ needs.installer-all.result }}"
            echo "- Dashboard tests: ${{ needs.dashboard-all.result }}"
            echo "- PHP SDK: ${{ needs.sdk-php-all.result }}"
            echo "- Python SDK: ${{ needs.sdk-python-all.result }}"
            echo "- JavaScript SDK: ${{ needs.sdk-javascript-all.result }}"
            echo "- Go SDK unit: ${{ needs.sdk-go-all.result }}"
            echo "- Go SDK e2e: ${{ needs.sdk-go-e2e.result }}"
            echo "- Ruby SDK: ${{ needs.sdk-ruby-all.result }}"
            echo "- Java SDK: ${{ needs.sdk-java-all.result }}"
            echo "- C# SDK: ${{ needs.sdk-csharp-all.result }}"
            echo "- WordPress: ${{ needs.integration-wordpress-all.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
