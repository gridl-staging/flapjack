name: Nightly Tests

# Comprehensive nightly test suite — runs on public repos only (staging/prod).
# The private dev repo is excluded because GitHub
# Actions minutes cost money on private repos. Use `debbie sync staging` to
# push changes where nightly CI runs for free.
#
# Covers: all Rust tests, dashboard integration with Algolia, all SDK versions,
# all integration tests.

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering

env:
  CARGO_TERM_COLOR: always

jobs:
  # Guard: only run on recognized public repos. The private dev repo is
  # intentionally excluded — CI belongs on staging/prod where Actions is free.
  check-repo:
    runs-on: ubuntu-latest
    outputs:
      is-public-repo: ${{ steps.check.outputs.is-public-repo }}
    steps:
      - id: check
        run: |
          if [ "${{ github.repository }}" = "flapjackhq/flapjack" ] || [ "${{ github.repository }}" = "gridl-staging/flapjack" ]; then
            echo "is-public-repo=true" >> $GITHUB_OUTPUT
          else
            echo "is-public-repo=false" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # RUST ENGINE TESTS (ALL)
  # ============================================================================

  rust-all-tests:
    name: Rust all tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h
        working-directory: .
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine
      - uses: taiki-e/install-action@a93b01ec36baa756f8701f3a0a8daa54a46d6339 # nextest
      - name: Create dashboard dist stub (for RustEmbed)
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Rustfmt
        run: cargo fmt --all --check
      - name: Clippy
        run: >
          cargo clippy --workspace --all-targets -- -D warnings
          -A clippy::too_many_arguments
          -A clippy::type_complexity
          -A clippy::only_used_in_recursion
          -A deprecated
      - name: Build binaries
        run: cargo build --package flapjack-server
      - name: Run all tests
        timeout-minutes: 10
        run: cargo nextest run -P ci

  installer-all:
    name: Installer tests (all platforms)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run installer tests
        run: sh engine/tests/test_install.sh

  # ============================================================================
  # DASHBOARD TESTS (ALL)
  # ============================================================================

  dashboard-all:
    name: Dashboard all tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine
      - name: Create dashboard dist stub (for RustEmbed)
        working-directory: engine
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build Flapjack server binary
        working-directory: engine
        run: cargo build --package flapjack-server --features vector-search
      - name: Start Flapjack server
        run: |
          chmod +x engine/target/debug/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY=fj_devtestadminkey000000 engine/target/debug/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: engine/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: engine/dashboard
        run: npm ci
      - name: Install Playwright browsers
        working-directory: engine/dashboard
        run: npx playwright install --with-deps chromium
      - name: Type check & build
        working-directory: engine/dashboard
        run: npm run build
      - name: Run unit tests
        working-directory: engine/dashboard
        run: npm run test:unit:run
      - name: Run page tests
        working-directory: engine/dashboard
        run: npm run test:pages
      - name: Run integration tests
        working-directory: engine/dashboard
        run: npm run test:integration
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: dashboard-all-tests-report
          path: engine/dashboard/playwright-report/
          retention-days: 14

  # ============================================================================
  # BUILD SERVER (shared by SDK e2e tests)
  # ============================================================================

  build-server:
    name: Build server binary
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine
      - name: Create dashboard dist stub (for RustEmbed)
        working-directory: engine
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build server
        working-directory: engine
        run: cargo build --package flapjack-server --features vector-search
      - name: Upload server binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flapjack-server
          path: engine/target/debug/flapjack
          retention-days: 1

  # ============================================================================
  # SDK TESTS (ALL VERSIONS)
  # ============================================================================

  sdk-php-all:
    name: PHP SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
      - name: Install dependencies
        working-directory: sdks/php
        run: composer install --no-interaction --prefer-dist
      - name: Run tests
        working-directory: sdks/php
        run: vendor/bin/phpunit

  sdk-python-all:
    name: Python SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        working-directory: sdks/python
        run: poetry install
      - name: Run tests
        working-directory: sdks/python
        run: poetry run pytest

  sdk-javascript-all:
    name: JavaScript SDK (all Node versions)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack (for yarn)
        run: corepack enable
      - name: Install dependencies
        working-directory: sdks/javascript
        run: yarn install
      - name: Build packages
        working-directory: sdks/javascript
        run: yarn build
      - name: Run tests
        working-directory: sdks/javascript/packages/flapjack-search
        run: yarn test

  sdk-go-all:
    name: Go SDK (all versions)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.21', '1.22', '1.23']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run tests
        working-directory: sdks/go
        run: go test ./flapjack/...

  sdk-go-e2e:
    name: Go SDK e2e tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
      - name: Run e2e tests
        working-directory: sdks/go
        run: go test ./tests/...

  sdk-ruby-all:
    name: Ruby SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: sdks/ruby
      - name: Run tests
        working-directory: sdks/ruby
        run: bundle exec rake test

  sdk-java-all:
    name: Java SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Run tests
        working-directory: sdks/java
        run: ./gradlew test

  sdk-csharp-all:
    name: C# SDK (all versions)
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['7.0.x', '8.0.x']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download server binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore dependencies
        working-directory: sdks/csharp
        run: dotnet restore
      - name: Run tests
        working-directory: sdks/csharp
        run: dotnet test

  # ============================================================================
  # INTEGRATION TESTS (ALL VERSIONS)
  # ============================================================================

  # integration-laravel-all: removed 2026-05-28. The integration at
  # integrations/laravel-scout/ is currently a composer.json stub (no src/, no
  # tests/, no phpunit.xml). Pre-org-transfer the check-repo guard skipped this
  # job; post-transfer it ran and (correctly) failed because phpunit found no
  # suite. Reinstate this job when the Laravel Scout integration ships.

  integration-wordpress-all:
    name: WordPress (all versions)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout PHP SDK
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: temp-php-sdk
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
      - name: Copy PHP SDK
        run: |
          mkdir -p sdks/php
          cp -r temp-php-sdk/sdks/php/* sdks/php/ || true
      - name: Install dependencies
        working-directory: sdks/wordpress
        run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        working-directory: sdks/wordpress
        run: composer run test:unit
      - name: Run integration tests
        working-directory: sdks/wordpress
        run: composer run test:integration

  # ============================================================================
  # SUMMARY
  # ============================================================================

  nightly-summary:
    name: Nightly test summary
    needs:
      - check-repo
      - rust-all-tests
      - installer-all
      - dashboard-all
      - build-server
      - sdk-php-all
      - sdk-python-all
      - sdk-javascript-all
      - sdk-go-all
      - sdk-go-e2e
      - sdk-ruby-all
      - sdk-java-all
      - sdk-csharp-all
      - integration-wordpress-all
    if: always() && needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          echo "## Nightly Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Rust tests: ${{ needs.rust-all-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Installer tests: ${{ needs.installer-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dashboard tests: ${{ needs.dashboard-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- PHP SDK: ${{ needs.sdk-php-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Python SDK: ${{ needs.sdk-python-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript SDK: ${{ needs.sdk-javascript-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Go SDK unit: ${{ needs.sdk-go-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Go SDK e2e: ${{ needs.sdk-go-e2e.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby SDK: ${{ needs.sdk-ruby-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Java SDK: ${{ needs.sdk-java-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- C# SDK: ${{ needs.sdk-csharp-all.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- WordPress: ${{ needs.integration-wordpress-all.result }}" >> $GITHUB_STEP_SUMMARY
