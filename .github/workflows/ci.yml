name: CI

# CI runs on the public staging and prod repos only. The private dev repo
# (gridl-dev/flapjack_dev) must never run CI — it burns paid Actions minutes.
# Use `debbie sync staging` to push changes to the public repo where CI is free.
on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Guard: only run on recognized public repos. The private dev repo is
  # intentionally excluded — CI belongs on staging/prod where Actions is free.
  check-repo:
    runs-on: ubuntu-latest
    outputs:
      is-public-repo: ${{ steps.check.outputs.is-public-repo }}
    steps:
      - id: check
        run: |
          if [ "${{ github.repository }}" = "gridl-hq/flapjack" ] || [ "${{ github.repository }}" = "gridl-staging/flapjack" ]; then
            echo "is-public-repo=true" >> $GITHUB_OUTPUT
          else
            echo "is-public-repo=false" >> $GITHUB_OUTPUT
          fi
  # ============================================================================
  # RUST ENGINE TESTS
  # ============================================================================

  fmt:
    name: Rustfmt
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Create dashboard dist stub (for RustEmbed)
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Clippy (with vector-search)
        run: >
          cargo clippy
          -p flapjack -p flapjack-http -p flapjack-server
          --all-targets --features vector-search
          -- -D warnings
          -W clippy::cognitive_complexity
      - name: Clippy (remaining crates)
        run: >
          cargo clippy
          -p flapjack-ssl -p flapjack-replication
          --all-targets
          -- -D warnings
          -W clippy::cognitive_complexity

  rust-tests-fast:
    name: Rust tests (fast)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h
        working-directory: .
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: taiki-e/install-action@nextest
      - name: Create dashboard dist stub (for RustEmbed)
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build binaries (needed by integration tests)
        run: cargo build --package flapjack-server --features vector-search
      - name: Fast tests (vector-search)
        run: cargo nextest run -p flapjack -p flapjack-http --features vector-search
      - name: Fast tests (remaining)
        run: cargo nextest run -p flapjack-server -p flapjack-ssl -p flapjack-replication

  rust-tests-all:
    name: Rust tests (all)
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h
        working-directory: .
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: taiki-e/install-action@nextest
      - name: Create dashboard dist stub (for RustEmbed)
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build binaries (needed by integration tests)
        run: cargo build --package flapjack-server --features vector-search
      - name: All tests (vector-search)
        run: cargo nextest run -p flapjack -p flapjack-http --features vector-search -P ci
      - name: All tests (remaining)
        run: cargo nextest run -p flapjack-server -p flapjack-ssl -p flapjack-replication -P ci

  # ============================================================================
  # BUILD SERVER (shared by SDK e2e tests)
  # ============================================================================

  build-server:
    name: Build server binary
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Create dashboard dist stub (for RustEmbed)
        working-directory: engine
        run: mkdir -p dashboard/dist && echo '<html></html>' > dashboard/dist/index.html
      - name: Build server
        working-directory: engine
        run: cargo build --package flapjack-server --features vector-search
      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: flapjack-server
          path: engine/target/debug/flapjack
          retention-days: 1

  # ============================================================================
  # INTEGRATION SMOKE TEST
  # ============================================================================

  integration-smoke:
    name: Integration smoke
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Run integration smoke harness
        run: |
          set -o pipefail
          chmod +x /tmp/flapjack/flapjack
          SMOKE_LOG="$RUNNER_TEMP/integration-smoke.log"
          FLAPJACK_BIN=/tmp/flapjack/flapjack bash engine/tests/integration_smoke.sh 2>&1 | tee "$SMOKE_LOG"
      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-smoke-log
          path: ${{ runner.temp }}/integration-smoke.log
          retention-days: 7

  # ============================================================================
  # DASHBOARD TESTS
  # ============================================================================

  dashboard-unit:
    name: Dashboard unit tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: engine/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: engine/dashboard
        run: npm install
      - name: Run unit tests
        working-directory: engine/dashboard
        run: npm run test:unit:run

  dashboard-build:
    name: Dashboard build
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: engine/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: engine/dashboard
        run: npm install
      - name: Type check & build
        working-directory: engine/dashboard
        run: npm run build

  dashboard-pages:
    name: Dashboard page tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY=fj_devtestadminkey000000 /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: engine/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: engine/dashboard
        run: npm install
      - name: Install Playwright browsers
        working-directory: engine/dashboard
        run: npx playwright install --with-deps chromium
      - name: Run page tests
        working-directory: engine/dashboard
        run: npm run test:e2e-ui:smoke
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-pages-report
          path: engine/dashboard/playwright-report/
          retention-days: 7

  dashboard-full-e2e:
    name: Dashboard full e2e tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY=fj_devtestadminkey000000 /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: engine/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: engine/dashboard
        run: npm install
      - name: Install Playwright browsers
        working-directory: engine/dashboard
        run: npx playwright install --with-deps chromium
      - name: Run full e2e tests
        working-directory: engine/dashboard
        run: npm run test:e2e-ui:full
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-full-e2e-report
          path: engine/dashboard/playwright-report/
          retention-days: 7

  dashboard-integration:
    name: Dashboard integration tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY=fj_devtestadminkey000000 /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: engine/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: engine/dashboard
        run: npm install
      - name: Install Playwright browsers
        working-directory: engine/dashboard
        run: npx playwright install --with-deps chromium
      - name: Run integration tests
        working-directory: engine/dashboard
        run: npm run test:integration
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-integration-report
          path: engine/dashboard/playwright-report/
          retention-days: 7

  # ============================================================================
  # SDK TESTS
  # ============================================================================

  sdk-php:
    name: PHP SDK tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
      - name: Install dependencies
        working-directory: sdks/php
        run: composer install --no-interaction --prefer-dist
      - name: Run tests
        working-directory: sdks/php
        run: vendor/bin/phpunit

  sdk-python:
    name: Python SDK tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Install Poetry
        run: pipx install poetry
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'poetry'
      - name: Install dependencies
        working-directory: sdks/python
        run: poetry install
      - name: Run tests
        working-directory: sdks/python
        run: poetry run pytest

  sdk-javascript:
    name: JavaScript SDK tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable corepack (for yarn)
        run: corepack enable
      - name: Install dependencies
        working-directory: sdks/javascript
        run: yarn install
      - name: Build packages
        working-directory: sdks/javascript
        run: yarn build
      - name: Run tests
        working-directory: sdks/javascript/packages/flapjack-search
        run: yarn test

  sdk-go:
    name: Go SDK tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.21', '1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run unit tests
        working-directory: sdks/go
        run: go test ./flapjack/...

  sdk-go-e2e:
    name: Go SDK e2e tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run e2e tests
        working-directory: sdks/go
        run: go test ./tests/...

  sdk-ruby:
    name: Ruby SDK tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: sdks/ruby
      - name: Run tests
        working-directory: sdks/ruby
        run: bundle exec rake test

  sdk-java:
    name: Java SDK tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run tests
        working-directory: sdks/java
        run: ./gradlew test

  sdk-csharp:
    name: C# SDK tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    env:
      FLAPJACK_APP_ID: test-app
      FLAPJACK_API_KEY: test-api-key
    steps:
      - uses: actions/checkout@v4
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          FLAPJACK_ADMIN_KEY="$FLAPJACK_API_KEY" /tmp/flapjack/flapjack --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        working-directory: sdks/csharp
        run: dotnet restore
      - name: Run tests
        working-directory: sdks/csharp
        run: dotnet test

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================

  integration-laravel-scout:
    name: Laravel Scout tests
    needs: [check-repo, build-server]
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - name: Check if tests exist
        id: check-tests
        run: |
          if [ -d "integrations/laravel-scout/src" ] && [ -d "integrations/laravel-scout/tests" ]; then
            echo "has-tests=true" >> $GITHUB_OUTPUT
          else
            echo "has-tests=false" >> $GITHUB_OUTPUT
            echo "::warning::Laravel Scout src/ or tests/ directory not found, skipping tests"
          fi
      - name: Download server binary
        if: steps.check-tests.outputs.has-tests == 'true'
        uses: actions/download-artifact@v4
        with:
          name: flapjack-server
          path: /tmp/flapjack
      - name: Start Flapjack server
        if: steps.check-tests.outputs.has-tests == 'true'
        run: |
          chmod +x /tmp/flapjack/flapjack
          mkdir -p /tmp/flapjack-data
          SERVER_LOG=/tmp/flapjack-data/server.log
          /tmp/flapjack/flapjack --no-auth --data-dir /tmp/flapjack-data >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          bash engine/tests/common/wait_for_flapjack.sh --pid "$SERVER_PID" --host localhost --port 7700 --log-path "$SERVER_LOG"
      - name: Setup PHP
        if: steps.check-tests.outputs.has-tests == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
      - name: Install dependencies
        if: steps.check-tests.outputs.has-tests == 'true'
        working-directory: integrations/laravel-scout
        run: composer install --no-interaction --prefer-dist
      - name: Run tests
        if: steps.check-tests.outputs.has-tests == 'true'
        working-directory: integrations/laravel-scout
        run: vendor/bin/phpunit

  integration-wordpress:
    name: WordPress plugin tests
    needs: check-repo
    if: needs.check-repo.outputs.is-public-repo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - name: Checkout PHP SDK
        uses: actions/checkout@v4
        with:
          path: temp-php-sdk
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
      - name: Copy PHP SDK
        run: |
          mkdir -p sdks/php
          cp -r temp-php-sdk/sdks/php/* sdks/php/ || true
      - name: Install dependencies
        working-directory: sdks/wordpress
        run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        working-directory: sdks/wordpress
        run: composer run test:unit
      - name: Run integration tests
        working-directory: sdks/wordpress
        run: composer run test:integration
