  lets you use Flapjack from your JVM project, such as Android or backend implementations."
POM_URL=https://github.com/flapjackhq/flapjack-search-kotlin
POM_SCM_URL=https://github.com/flapjackhq/flapjack-search-kotlin
POM_SCM_CONNECTION=scm:git:git://github.com/flapjackhq/flapjack-search-kotlin.git
POM_SCM_DEV_CONNECTION=scm:git:ssh://github.com/flapjackhq/flapjack-search-kotlin.git
POM_LICENCE_NAME=MIT
POM_LICENCE_URL=https://www.opensource.org/licenses/mit-license.php
POM_LICENCE_DIST=repo
POM_DEVELOPER_ID=flapjackhq
POM_DEVELOPER_NAME=Flapjack
POM_DEVELOPER_EMAIL=dev@flapjack.io
POM_ISSUE_SYSTEM=github
POM_ISSUE_URL=https://github.com/flapjackhq/flapjack-search-kotlin/issues

